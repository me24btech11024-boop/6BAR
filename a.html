<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-Bar Mechanism | Animation</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #f8f9fa; color: #333; }
        
        .sidebar { width: 17%; min-width: 260px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); overflow-y: auto; }
        .sidebar h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #4ca1af; padding-bottom: 10px; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #bdc3c7; }
        .control-group input { width: 100%; padding: 6px; border: 1px solid #34495e; border-radius: 4px; background-color: #ecf0f1; color: #2c3e50; box-sizing: border-box; font-weight:bold;}
        
        #update-btn, #play-btn { background-color: #2980b9; color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: 0.3s; width: 100%;}
        #update-btn:hover, #play-btn:hover { background-color: #3498db; }
        #play-btn { background-color: #27ae60; margin-bottom: 20px;}
        #play-btn.paused { background-color: #e67e22; }

        .main-content { flex: 1; display: flex; flex-direction: column; background-color: white; overflow: hidden; }
        .tabs { display: flex; background-color: #ecf0f1; border-bottom: 2px solid #bdc3c7; }
        .tab-button { background-color: inherit; border: none; outline: none; cursor: pointer; padding: 14px 20px; font-size: 0.95rem; font-weight: bold; color: #7f8c8d; transition: 0.3s; text-decoration: none;}
        .tab-button:hover { background-color: #dfe6e9; color: #2c3e50; }
        .tab-button.active { background-color: white; color: #2980b9; border-bottom: 3px solid #2980b9; }

        .tab-content { padding: 20px; flex: 1; overflow: hidden; flex-direction: column; background-color: #1a1a2e; display: flex;} 
        .canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #1a1a2e;}
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #1a1a2e; border-radius: 4px;}
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Animation Controls</h2>
        <div class="control-group"><label>Crank Radius (mm)</label><input type="number" id="crank" value="30"></div>
        <div class="control-group"><label>Ground Dist O2-O4 (mm)</label><input type="number" id="dfix" value="60"></div>
        <div class="control-group"><label>Slider Arm O4-B (mm)</label><input type="number" id="larm" value="25"></div>
        <div class="control-group"><label>Slider Column X (mm)</label><input type="number" id="xd" value="-35"></div>
        
        <div class="control-group" style="margin-top: 15px; border-top: 1px solid #4ca1af; padding-top: 15px;">
            <label>Animation Speed</label>
            <input type="range" id="speed" min="0.005" max="0.05" step="0.005" value="0.015">
        </div>

        <button id="play-btn" onclick="togglePlay()">Pause Animation</button>
        <button id="update-btn" onclick="initMechanism()">Update Geometry</button>
    </aside>

    <main class="main-content">
        <nav class="tabs">
            <a href="index.html" class="tab-button">Synthesis & Derivation</a>
            <a href="k.html" class="tab-button">Kinematic Analysis</a>
            <a href="d.html" class="tab-button">Dynamic Force Analysis</a>
            <a href="a.html" class="tab-button active">Animation</a>
        </nav>

        <div class="tab-content">
            <div class="canvas-container">
                <canvas id="mechCanvas" width="1400" height="750"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Exact a.py Animation Logic
        let d_fix, r_crank, L_arm, x_d;
        const L_lever = 95.0;
        const r_p = 18.0;
        const beta_body = 150.0 * Math.PI / 180.0;
        let O5 = {x: 0, y: 0};
        let L5 = 0;
        
        const a_c = (5 - 2025*(5.0/4050))/45;
        const b_c = 5.0/4050;

        let phi = 0, isPlaying = true, animationId;
        let By_max, By_min, phi_start, phi_bottom, fwd_arc, ret_arc;

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            btn.innerText = isPlaying ? "Pause Animation" : "Play Animation";
            isPlaying ? btn.classList.remove('paused') : btn.classList.add('paused');
        }

        function initMechanism() {
            if(animationId) cancelAnimationFrame(animationId);
            
            d_fix = parseFloat(document.getElementById('dfix').value);
            r_crank = parseFloat(document.getElementById('crank').value);
            L_arm = parseFloat(document.getElementById('larm').value);
            x_d = parseFloat(document.getElementById('xd').value);

            By_max = -99999; By_min = 99999;
            for(let p = 0; p < Math.PI * 2; p += 0.005) {
                let psi = Math.atan2(r_crank * Math.sin(p), r_crank * Math.cos(p) - d_fix);
                let By = L_arm * Math.sin(psi);
                if(By > By_max) { By_max = By; phi_start = p; }
                if(By < By_min) { By_min = By; phi_bottom = p; }
            }

            fwd_arc = (phi_bottom - phi_start);
            if (fwd_arc < 0) fwd_arc += 2 * Math.PI;
            ret_arc = 2 * Math.PI - fwd_arc;

            let P_top_x = x_d + r_p * Math.cos(beta_body);
            let P_top_y = By_max + r_p * Math.sin(beta_body);
            let P_bot_x = x_d + r_p * Math.cos(beta_body - Math.PI/2);
            let P_bot_y = By_min + r_p * Math.sin(beta_body - Math.PI/2);

            let dv_x = P_bot_x - P_top_x, dv_y = P_bot_y - P_top_y;
            let mag = Math.hypot(-dv_y, dv_x);
            
            O5.x = ((P_top_x + P_bot_x)/2.0) - 20.0 * (-dv_y/mag);
            O5.y = ((P_top_y + P_bot_y)/2.0) - 20.0 * (dv_x/mag);
            L5 = Math.hypot(O5.x - P_top_x, O5.y - P_top_y);

            phi = phi_start; 
            renderFrame();
        }

        function get_disk_angle(Cy) {
            let dx_c = x_d - O5.x, dy_c = Cy - O5.y;
            let R_c = Math.hypot(dx_c, dy_c);
            let K = (L5*L5 - dx_c*dx_c - dy_c*dy_c - r_p*r_p) / (2.0 * r_p);
            return Math.max(0, Math.min(90, (beta_body - (Math.atan2(dy_c, dx_c) + Math.acos(Math.max(-1, Math.min(1, K/R_c))))) * 180.0 / Math.PI));
        }

        function renderFrame() {
            if(isPlaying) phi = (phi + parseFloat(document.getElementById('speed').value)) % (2 * Math.PI);

            const Ax = r_crank * Math.cos(phi), Ay = r_crank * Math.sin(phi);
            const psi = Math.atan2(Ay, Ax - d_fix);
            const Bx = d_fix + L_arm * Math.cos(psi), By = L_arm * Math.sin(psi);
            const Lx = d_fix + L_lever * Math.cos(psi), Ly = L_lever * Math.sin(psi);
            const Cx = x_d, Cy = By; 

            const theta_deg = get_disk_angle(Cy);
            const drop_mm = a_c * theta_deg + b_c * Math.pow(theta_deg, 2);
            const Px = Cx + r_p * Math.cos(beta_body - (theta_deg * Math.PI / 180.0));
            const Py = Cy + r_p * Math.sin(beta_body - (theta_deg * Math.PI / 180.0));

            draw(Ax, Ay, Bx, By, Lx, Ly, Cx, Cy, Px, Py, theta_deg, drop_mm);
            animationId = requestAnimationFrame(renderFrame);
        }

        function draw(Ax, Ay, Bx, By, Lx, Ly, Cx, Cy, Px, Py, theta_deg, drop_mm) {
            const canvas = document.getElementById('mechCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawPanel(ctx, 20, 40, 700, 680, "Mechanism View", -80, 115, -55, 55, (mapX, mapY, sX, sY) => {
                ctx.fillStyle = 'rgba(26, 42, 62, 0.6)'; ctx.fillRect(mapX(x_d - 4), mapY(50), sX(8), sY(100));
                ctx.strokeStyle = '#556'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(mapX(x_d), mapY(-50)); ctx.lineTo(mapX(x_d), mapY(50)); ctx.stroke();

                const drawLine = (x1, y1, x2, y2, c, w, a=1) => { ctx.beginPath(); ctx.moveTo(mapX(x1), mapY(y1)); ctx.lineTo(mapX(x2), mapY(y2)); ctx.strokeStyle=c; ctx.lineWidth=w; ctx.globalAlpha=a; ctx.stroke(); ctx.globalAlpha=1; };
                drawLine(0, 0, Ax, Ay, '#ff6b6b', 4); drawLine(d_fix, 0, Lx, Ly, '#ffd166', 8, 0.5); drawLine(d_fix, 0, Lx, Ly, '#ffd166', 1.5);
                drawLine(Bx, By, Cx, Cy, '#a8dadc', 3); drawLine(Cx, Cy, Px, Py, '#ff9f43', 3.5); drawLine(O5.x, O5.y, Px, Py, '#c084fc', 3);

                ctx.beginPath(); ctx.arc(mapX(Cx), mapY(Cy), sX(22), (theta_deg - 90)*Math.PI/180, (theta_deg - 360)*Math.PI/180, true); ctx.lineTo(mapX(Cx), mapY(Cy));
                ctx.fillStyle = 'rgba(173, 216, 230, 0.75)'; ctx.fill(); ctx.strokeStyle = '#2a6496'; ctx.lineWidth = 1.8; ctx.stroke();

                const drawJoint = (x, y, c, sq) => { ctx.beginPath(); sq ? ctx.rect(mapX(x)-4, mapY(y)-4, 8, 8) : ctx.arc(mapX(x), mapY(y), 4.5, 0, 2*Math.PI); ctx.fillStyle=c; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.2; ctx.stroke(); };
                drawJoint(0, 0, '#ff6b6b', true); drawJoint(d_fix, 0, '#ff6b6b', true); drawJoint(O5.x, O5.y, '#c084fc', true); drawJoint(Ax, Ay, '#06d6a0'); drawJoint(Bx, By, '#ffd166'); drawJoint(Cx, Cy, '#a8dadc', true); drawJoint(Px, Py, '#ff9f43');

                // --- NEW EXPLICIT TEXT LABELS (Offset slightly so they don't cover joints) ---
                const drawLabel = (x, y, text, color, dx, dy) => {
                    ctx.fillStyle = color;
                    ctx.font = "bold 13px 'Segoe UI', sans-serif";
                    ctx.fillText(text, mapX(x) + dx, mapY(y) + dy);
                };
                
                drawLabel(0, 0, "O2", "#ff6b6b", 6, 15);
                drawLabel(d_fix, 0, "O4", "#ff6b6b", 6, 15);
                drawLabel(O5.x, O5.y, "O5", "#c084fc", 6, 15);
                drawLabel(Ax, Ay, "A", "#06d6a0", 6, -8);
                drawLabel(Bx, By, "B", "#ffd166", 6, 15);
                drawLabel(Cx, Cy, "C", "#a8dadc", 14, 4);
                drawLabel(Px, Py, "P", "#ff9f43", 6, -8);

                ctx.fillStyle = "white"; ctx.font = "bold 11px monospace";
                ctx.fillText(`Crank= ${(phi*180/Math.PI).toFixed(1)}°`, mapX(-75), mapY(47)); ctx.fillText(`Theta= ${theta_deg.toFixed(1)}°`, mapX(-75), mapY(41)); ctx.fillText(`Drop = ${drop_mm.toFixed(2)}mm`, mapX(-75), mapY(35));

                let p = (phi - phi_start) % (2*Math.PI); if(p<0) p+=2*Math.PI; let isFwd = p <= fwd_arc;
                ctx.fillStyle = "#333"; ctx.fillRect(mapX(-75), mapY(-43), sX(110), 4); ctx.fillRect(mapX(-75), mapY(-49), sX(110), 4);
                ctx.fillStyle = "#4CAF50"; ctx.fillRect(mapX(-75), mapY(-43), sX(110 * (isFwd ? p/fwd_arc : 0)), 4);
                ctx.fillStyle = "#f44336"; ctx.fillRect(mapX(-75), mapY(-49), sX(110 * (!isFwd ? (p-fwd_arc)/ret_arc : 0)), 4);
                ctx.font = "bold 12px 'Segoe UI'"; ctx.fillStyle = isFwd ? "#4CAF50" : "#f44336"; ctx.fillText(isFwd ? "FORWARD (slow)" : "RETURN (2x fast)", mapX(-75), mapY(-36));
            });

            drawPanel(ctx, 740, 40, 640, 680, "Disk Motion", -80, 80, -80, 70, (mapX, mapY, sX, sY) => {
                const hLine = (y, c) => { ctx.strokeStyle=c; ctx.beginPath(); ctx.moveTo(mapX(-80), mapY(y)); ctx.lineTo(mapX(80), mapY(y)); ctx.stroke(); };
                ctx.lineWidth = 1; ctx.setLineDash([2,2]); hLine(0, '#4CAF50'); hLine(-5, '#FF9800'); hLine(-15, '#f44336'); ctx.setLineDash([]);
                ctx.font = "bold 16px Arial"; ctx.fillStyle = "#4CAF50"; ctx.fillText("A", mapX(60), mapY(2)); ctx.fillStyle = "#FF9800"; ctx.fillText("B", mapX(60), mapY(-3)); ctx.fillStyle = "#f44336"; ctx.fillText("C", mapX(60), mapY(-13));

                ctx.beginPath(); ctx.arc(mapX(0), mapY(-drop_mm), sX(50), (theta_deg - 90)*Math.PI/180, (theta_deg - 360)*Math.PI/180, true); ctx.lineTo(mapX(0), mapY(-drop_mm));
                ctx.fillStyle = 'rgba(173, 216, 230, 0.9)'; ctx.fill(); ctx.strokeStyle = '#2a6496'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.arc(mapX(0), mapY(-drop_mm), 5, 0, 2*Math.PI); ctx.fillStyle = "#1a1a2e"; ctx.fill(); ctx.strokeStyle = "#2a6496"; ctx.stroke();

                ctx.fillStyle = "#7fdbff"; ctx.font = "bold 13px monospace"; ctx.fillText(`Rotation: ${theta_deg.toFixed(1)} deg`, mapX(-10), mapY(60)); ctx.fillText(`Drop: ${drop_mm.toFixed(2)} mm`, mapX(-10), mapY(54)); ctx.fillText(`QR: ${(fwd_arc/ret_arc).toFixed(2)}:1`, mapX(-10), mapY(48));
            });
        }

        function drawPanel(ctx, pX, pY, pW, pH, title, minX, maxX, minY, maxY, drawCmds) {
            ctx.fillStyle = '#0f0f23'; ctx.fillRect(pX, pY, pW, pH); ctx.strokeStyle = '#333'; ctx.strokeRect(pX, pY, pW, pH);
            ctx.fillStyle = '#7fdbff'; ctx.font = "bold 14px 'Segoe UI'"; ctx.fillText(title, pX + 15, pY + 25);
            const sX = pW / (maxX - minX), sY = pH / (maxY - minY);
            const mapX = x => pX + (x - minX) * sX, mapY = y => pY + pH - (y - minY) * sY;
            ctx.strokeStyle = '#222'; ctx.setLineDash([4, 4]);
            for(let x = Math.ceil(minX/10)*10; x <= maxX; x+=20) { ctx.beginPath(); ctx.moveTo(mapX(x), pY); ctx.lineTo(mapX(x), pY+pH); ctx.stroke(); }
            for(let y = Math.ceil(minY/10)*10; y <= maxY; y+=20) { ctx.beginPath(); ctx.moveTo(pX, mapY(y)); ctx.lineTo(pX+pW, mapY(y)); ctx.stroke(); }
            ctx.setLineDash([]); drawCmds(mapX, mapY, d=>d*sX, d=>d*sY);
        }

        window.onload = () => { initMechanism(); };
    </script>
</body>
</html>
